<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>稼働状況 - MizuLab</title>
<link rel="stylesheet" href="style.css">
<style>
  .status-indicator {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 24px; border-radius: 10px; margin-bottom: 16px;
  }
  .status-indicator.normal  { background: #f0fdf4; border: 1px solid #86efac; }
  .status-indicator.warning { background: #fffbeb; border: 1px solid #fcd34d; }
  .status-indicator.danger  { background: #fef2f2; border: 1px solid #fca5a5; }
  .status-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.normal  { background: #22c55e; box-shadow: 0 0 0 4px #dcfce7; animation: pg 2s infinite; }
  .status-dot.warning { background: #f59e0b; box-shadow: 0 0 0 4px #fef9c3; animation: py 2s infinite; }
  .status-dot.danger  { background: #ef4444; box-shadow: 0 0 0 4px #fee2e2; animation: pr 2s infinite; }
  @keyframes pg { 0%,100%{box-shadow:0 0 0 4px #dcfce7} 50%{box-shadow:0 0 0 8px #bbf7d0} }
  @keyframes py { 0%,100%{box-shadow:0 0 0 4px #fef9c3} 50%{box-shadow:0 0 0 8px #fef08a} }
  @keyframes pr { 0%,100%{box-shadow:0 0 0 4px #fee2e2} 50%{box-shadow:0 0 0 8px #fecaca} }
  .status-label { font-weight: 700; font-size: 16px; }
  .status-label.normal  { color: #166534; }
  .status-label.warning { color: #854d0e; }
  .status-label.danger  { color: #991b1b; }
  .status-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .history-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
  .history-item:last-child { border-bottom: none; }
  .history-date  { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .history-title { font-weight: 700; margin-bottom: 4px; }
  .history-desc  { font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Mizu<span>Lab</span></a>
  <nav>
    <a href="index.html">ホーム</a>
    <a href="guide.html">使い方</a>
    <a href="status.html" class="active">稼働状況</a>
    <a href="terms.html">利用規約</a>
    <a href="privacy.html">プライバシー</a>
  </nav>
</header>

<div style="background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); padding:48px 24px; text-align:center; color:#fff;">
  <h1 style="font-size:28px; font-weight:700; margin-bottom:8px;">稼働状況</h1>
  <p style="font-size:14px; opacity:0.8;">YouTube概要欄作成Botの現在の状態をご確認いただけます</p>
</div>

<div class="container">
  <div class="card">
    <h2 style="font-size:17px; font-weight:700; margin-bottom:20px;">現在の稼働状況</h2>
    <div id="current-status"><p style="color:var(--text-muted); font-size:14px;">読み込み中...</p></div>
  </div>
  <div class="card">
    <h2 style="font-size:17px; font-weight:700; margin-bottom:20px;">📅 メンテナンス予定</h2>
    <div id="maintenance-scheduled"><p style="color:var(--text-muted); font-size:14px;">読み込み中...</p></div>
  </div>
  <div class="card">
    <h2 style="font-size:17px; font-weight:700; margin-bottom:20px;">🗂️ 障害・メンテナンス履歴</h2>
    <div id="history-list"><p style="color:var(--text-muted); font-size:14px;">読み込み中...</p></div>
  </div>
  <div class="card">
    <h2 style="font-size:17px; font-weight:700; margin-bottom:20px;">🆕 更新履歴</h2>
    <div id="updates-list"><p style="color:var(--text-muted); font-size:14px;">読み込み中...</p></div>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="index.html">ホーム</a>
    <a href="guide.html">使い方</a>
    <a href="status.html">稼働状況</a>
    <a href="terms.html">利用規約</a>
    <a href="privacy.html">プライバシーポリシー</a>
  </div>
  <p>&copy; 2026 MizuLab</p>
</footer>

<script>
const statusConfig = {
  normal:  { cls: 'normal',  label: '正常稼働中' },
  warning: { cls: 'warning', label: '一部障害あり' },
  danger:  { cls: 'danger',  label: '停止中' },
};
const typeMap = {
  new:     { label: '新機能',   cls: 'badge-info' },
  fix:     { label: '修正',     cls: 'badge-warning' },
  release: { label: '公開',     cls: 'badge-success' },
  done:    { label: '完了',     cls: 'badge-success' },
  maint:   { label: 'メンテ',   cls: 'badge-warning' },
  fault:   { label: '障害',     cls: 'badge-danger' },
  info:    { label: 'お知らせ', cls: 'badge-info' },
};

function renderItem(item) {
  const t = typeMap[item.type] || { label: item.type, cls: 'badge-info' };
  return `<div class="history-item">
    <div class="history-date">${item.date}</div>
    <div class="history-title"><span class="badge ${t.cls}">${t.label}</span> ${item.title}</div>
    ${item.desc ? `<div class="history-desc">${item.desc}</div>` : ''}
  </div>`;
}

function empty() {
  return '<p style="color:var(--text-muted); font-size:14px;">まだありません。</p>';
}

fetch('status.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const sc = statusConfig[data.status] || statusConfig.normal;
    document.getElementById('current-status').innerHTML = `
      <div class="status-indicator ${sc.cls}">
        <div class="status-dot ${sc.cls}"></div>
        <div>
          <div class="status-label ${sc.cls}">${data.message || sc.label}</div>
          <div class="status-sub">${data.sub_message || ''}</div>
        </div>
      </div>
      <p style="font-size:13px; color:var(--text-muted);">最終確認日時：${data.updated || ''}</p>`;

    const ms = data.maintenance_scheduled || [];
    document.getElementById('maintenance-scheduled').innerHTML = ms.length
      ? ms.map(m => `<div class="history-item">
          <div class="history-date">${m.date}</div>
          <div class="history-title">${m.title}</div>
          ${m.desc ? `<div class="history-desc">${m.desc}</div>` : ''}
        </div>`).join('')
      : '<p style="color:var(--text-muted); font-size:14px;">現在、予定されているメンテナンスはありません。</p>';

    const hist = data.history || [];
    document.getElementById('history-list').innerHTML = hist.length ? hist.map(renderItem).join('') : empty();

    const upd = data.updates || [];
    document.getElementById('updates-list').innerHTML = upd.length ? upd.map(renderItem).join('') : empty();
  })
  .catch(() => {
    ['current-status','maintenance-scheduled','history-list','updates-list'].forEach(id => {
      document.getElementById(id).innerHTML = '<p style="color:var(--text-muted); font-size:14px;">データを読み込めませんでした。</p>';
    });
  });
</script>

</body>
</html>
